<div *ngIf="activity">
  <h3>Katılımcılar</h3>
  <ul>
    <li *ngFor="let p of activity.participants">
      {{ p.username || p.fullName }}
    </li>
  </ul>

  <button (click)="join()" *ngIf="!isParticipant(user?.id)">Katıl</button>
  <button (click)="leave()" *ngIf="isParticipant(user?.id)">Ayrıl</button>

  <div *ngIf="msg" style="margin-top: 10px; color: green;">
    {{ msg }}
  </div>
</div>
