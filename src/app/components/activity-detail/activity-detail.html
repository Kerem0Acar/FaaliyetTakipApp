<div *ngIf="activity">
  <h2>{{ activity.name }}</h2>
  <p>{{ activity.description }}</p>
  <p>Kategori: {{ activity.category?.name }}</p>
  <p>Başlangıç: {{ activity.startTime | date:'short' }}</p>
  <p>Bitiş: {{ activity.endTime | date:'short' }}</p>

  <hr/>

  <!-- Katılımcılar componenti -->
  <app-activity-participants></app-activity-participants>
</div>
